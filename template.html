
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Layout ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at 20% 20%, #ffd6eb, transparent),
    radial-gradient(circle at 80% 80%, #ffc1e3, transparent),
    #fff0f6;
}

/* ANIMASI */
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

@keyframes fly{
    0%{transform:translate(0,0);}
    50%{transform:translate(30px,-25px);}
    100%{transform:translate(0,0);}
}

/* BUTTERFLY */
.butterfly{
    position:absolute;
    font-size:24px;
    animation:fly 6s infinite ease-in-out;
}

/* BACK BUTTON */
.back-home{
    position:absolute;
    top:30px;
    left:30px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    padding:10px 20px;
    border-radius:50px;
    text-decoration:none;
    color:#ff4081;
    font-size:13px;
    transition:0.3s;
}

.back-home:hover{
    background:#ff4081;
    color:white;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:1300px;
    height:85vh;
    padding:40px;

    background: linear-gradient(
        135deg,
        rgba(255, 214, 235, 0.6),
        rgba(255, 240, 246, 0.6)
    );

    backdrop-filter:blur(20px);
    border-radius:40px;

    box-shadow:0 25px 50px rgba(255,182,193,0.3);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* TEXT */
h2{
    font-family:'Dancing Script',cursive;
    font-size:50px;
    color:#333;
}

.subtitle{
    font-size:14px;
    color:#777;
    margin-bottom:30px;
}

/* WRAPPER */
.layout-wrapper{
    display:flex;
    align-items:center;
    width:100%;
    position:relative;
}

/* GRID */
.layout-grid{
    display:flex;
    gap:25px;
    overflow-x:auto;
    padding:20px;
    scroll-behavior:smooth;
    scrollbar-width:none;
}
.layout-grid::-webkit-scrollbar{display:none;}

/* CARD (SUDAH DISAMAKAN 🔥) */
.layout-card{
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(15px);

    padding:12px;
    border-radius:20px;
    min-width:200px;
    text-align:center;
    cursor:pointer;
    transition:0.4s;
    position:relative;
    flex-shrink:0;

    border:1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 10px 25px rgba(255,182,193,0.2),
        inset 0 0 15px rgba(255,192,203,0.2);
}

.layout-card:hover{
    transform:translateY(-12px) scale(1.03);
    box-shadow:0 20px 40px rgba(255,182,193,0.5);
}

/* BADGE */
.badge{
    position:absolute;
    top:-10px;
    right:-5px;
    background:#ff4081;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    font-size:10px;
}

/* IMAGE */
.layout-image{
    width:100%;
    height:300px;
    border-radius:12px;
    object-fit:cover;
}

/* INFO */
.layout-info h4{
    font-size:14px;
    margin-top:10px;
}
.layout-info p{
    font-size:11px;
    color:#888;
}

/* NAV BUTTON */
.nav-btn{
    width:50px;
    height:50px;
    border-radius:50%;
    border:none;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.3s;
}

.nav-btn:hover{
    background:#ff4081;
    color:white;
}

/* SPARKLE */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:float 4s infinite ease-in-out;
}
</style>
</head>

<body>

<a href="index.html" class="back-home">❮ back</a>

<!-- BUTTERFLY -->
<div class="butterfly" style="top:50px; left:40%;">🦋</div>
<div class="butterfly" style="bottom:80px; right:30%;">🦋</div>

<div class="container" id="container">

<h2>Choose Your Layout</h2>
<p class="subtitle">Pick your favorite photobooth style 💕</p>

<div class="layout-wrapper">

<button class="nav-btn" onclick="scrollGrid(-300)">❮</button>

<div class="layout-grid" id="layout-grid"></div>

<button class="nav-btn" onclick="scrollGrid(300)">❯</button>

</div>
</div>

<script>
const grid = document.getElementById('layout-grid');
const container = document.getElementById('container');

/* GENERATE TEMPLATE */
for (let i = 1; i <= 20; i++) {
    const img = i % 2 === 0 ? 'pinkblue2.JPG' : 'pinkblue.JPG';
    const badge = i % 3 === 0 ? 'NEW' : 'HOT';

    const card = document.createElement('div');
    card.className = 'layout-card';
    card.onclick = () => window.location.href = 'halamanfoto.html';

    card.innerHTML = `
        <span class="badge">${badge}</span>
        <img src="${img}" class="layout-image">
        <div class="layout-info">
            <h4>Layout ${i}</h4>
            <p>4 Pose Strip</p>
        </div>
    `;

    grid.appendChild(card);
}

/* SPARKLE */
for (let i = 0; i < 40; i++) {
    let star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';
    container.appendChild(star);
}

/* SCROLL */
function scrollGrid(x){
    grid.scrollBy({left:x,behavior:'smooth'});
}
</script>

</body>
</html>
