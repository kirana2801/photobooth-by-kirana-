```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth by Kirana ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&family=Dancing+Script:wght@500;700&family=Reenie+Beanie&display=swap" rel="stylesheet">

<style>
:root {
    --soft-pink: #ffd6eb;
    --pink: #ffc1e3;
    --white: #ffffff;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at 20% 20%, #ffd6eb, transparent),
    radial-gradient(circle at 80% 80%, #ffc1e3, transparent),
    #fff0f6;
}

/* FLOAT */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* BUTTERFLY */
@keyframes fly {
    0% { transform: translate(0,0); }
    50% { transform: translate(40px,-30px); }
    100% { transform: translate(0,0); }
}

/* CLOUD */
.cloud {
    position:absolute;
    width:120px;
    height:60px;
    background:white;
    border-radius:50px;
    opacity:0.6;
    filter: blur(2px);
    animation: float 6s infinite ease-in-out;
}

.cloud::before,
.cloud::after {
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud::before {
    width:70px;
    height:70px;
    top:-30px;
    left:10px;
}

.cloud::after {
    width:50px;
    height:50px;
    top:-20px;
    right:10px;
}

/* BUTTERFLY */
.butterfly {
    position:absolute;
    font-size:28px;
    animation: fly 5s infinite ease-in-out;
}

/* CARD (SUDAH DIPINK-IN 🔥) */
.glass-card {
    position:relative;
    width:85%;
    max-width:1000px;
    height:75vh;

    background: linear-gradient(
        135deg,
        rgba(255, 214, 235, 0.7),
        rgba(255, 240, 246, 0.7)
    );

    backdrop-filter: blur(25px);
    border-radius:40px;

    box-shadow: 
        0 20px 40px rgba(255, 182, 193, 0.4),
        inset 0 0 30px rgba(255, 192, 203, 0.3);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* TEXT */
.brand-top {
    font-size:12px;
    letter-spacing:5px;
    color:#888;
}

.headline {
    font-family:'Dancing Script', cursive;
    font-size:70px;
    margin:10px 0;
    color:#333;

    text-shadow: 0 4px 15px rgba(255, 182, 193, 0.6);
}

.sub-headline {
    font-size:15px;
    color:#666;
    margin-bottom:30px;
}

/* BUTTON */
.btn-start {
    background:white;
    border:1px solid var(--soft-pink);
    padding:12px 60px;
    border-radius:20px;
    font-family:'Dancing Script';
    font-size:28px;
    cursor:pointer;
    transition:0.3s;
}

.btn-start:hover {
    transform:scale(1.1);
    background:#fff0f6;
}

/* POLAROID */
.polaroid {
    position:absolute;
    background:white;
    padding:10px 10px 35px;
    width:180px;
    box-shadow:0 15px 30px rgba(0,0,0,0.1);
    animation: float 4s infinite ease-in-out;
}

.polaroid img {
    width:100%;
    height:200px;
    object-fit:cover;
}

.polaroid span {
    font-family:'Reenie Beanie';
    font-size:22px;
}

.left-p {
    left:-60px;
    top:20%;
    transform:rotate(-10deg);
}

.right-p {
    right:-60px;
    bottom:15%;
    transform:rotate(12deg);
}

/* FOOTER */
.footer-links {
    position:absolute;
    bottom:20px;
    display:flex;
    gap:20px;
}

.footer-links a {
    text-decoration:none;
    color:#777;
    font-size:13px;
}

</style>
</head>

<body>

<!-- CLOUD -->
<div class="cloud" style="top:50px; left:100px;"></div>
<div class="cloud" style="top:120px; right:150px;"></div>

<!-- BUTTERFLY -->
<div class="butterfly" style="top:80px; left:50%;">🦋</div>
<div class="butterfly" style="bottom:100px; right:40%;">🦋</div>

<div class="glass-card">

    <div class="polaroid left-p">
        <img src="pinkblue.JPG">
        <span>Sweet Moments '26</span>
    </div>

    <span class="brand-top">Photobooth by Kirana</span>
    <h1 class="headline">Capture Every Magic Moment</h1>
    <p class="sub-headline">Preserve your beautiful memories in aesthetic style 💕</p>

    <button class="btn-start" onclick="window.location.href='template.html'">
        Start 📷
    </button>

    <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Templates</a>
        <a href="#">Privacy</a>
    </div>

    <div class="polaroid right-p">
        <img src="pinkblue2.JPG">
        <span>Magic & Smiles '26</span>
    </div>

</div>

</body>
</html>
