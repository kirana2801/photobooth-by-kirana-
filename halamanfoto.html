
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth Camera ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at 20% 20%, #ffd6eb, transparent),
    radial-gradient(circle at 80% 80%, #ffc1e3, transparent),
    #fff0f6;
}

/* BACK */
.back-home{
    position:absolute;
    top:15px;
    left:15px;
    background:rgba(255,255,255,0.7);
    padding:8px 15px;
    border-radius:50px;
    text-decoration:none;
    color:#ff4081;
    font-size:14px;
}

/* LAYOUT */
.main{
    display:flex;
    gap:25px;
    width:100%;
    max-width:1000px;
}

/* CAMERA */
.container{
    flex:1;
    padding:20px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(20px);
    border-radius:25px;
    text-align:center;
}

.camera-box{
    width:100%;
    max-width:500px;
    height:280px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:#000;
    margin-bottom:15px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

#frame-overlay{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* TIMER */
#countdown{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:white;
    display:none;
    font-family:'Dancing Script';
}

/* BUTTON */
.btn{
    width:100%;
    max-width:230px;
    padding:10px;
    border:none;
    border-radius:30px;
    font-family:'Dancing Script';
    font-size:22px;
    background:white;
    cursor:pointer;
}

/* TEMPLATE */
.templates{
    margin-top:10px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.template{
    width:55px;
    height:55px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid white;
    cursor:pointer;
    transition:0.3s;
}

.template img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.template.active{
    border-color:#ff4081;
    transform:scale(1.1);
}

/* PREVIEW */
.preview{
    width:170px;
    padding:10px;
    background:rgba(255,255,255,0.6);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.frame{
    position:relative;
}

.frame img{
    width:100%;
    height:85px;
    border-radius:10px;
    object-fit:cover;
}

/* DELETE */
.delete-btn{
    position:absolute;
    top:5px;
    right:5px;
    background:#ff4081;
    color:white;
    font-size:12px;
    padding:5px;
    border-radius:50%;
    opacity:0;
    transition:0.2s;
    cursor:pointer;
}

/* hover desktop */
.frame:hover .delete-btn{
    opacity:1;
}

/* tap mobile */
.frame.active .delete-btn{
    opacity:1;
}

/* 📱 MOBILE */
@media(max-width:768px){

    body{
        padding:10px;
        align-items:flex-start;
    }

    .main{
        flex-direction:column;
        gap:15px;
    }

    .preview{
        flex-direction:row;
        width:100%;
        justify-content:center;
    }

    .frame img{
        height:70px;
    }

    .camera-box{
        height:220px;
    }
}
</style>
</head>

<body>

<a href="index.html" class="back-home">❮ Back</a>

<div class="main">

<div class="container">
    <h2 style="font-family:'Dancing Script'">Ready to Smile? ✨</h2>

    <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay">
        <div id="countdown">3</div>
    </div>

    <button class="btn" onclick="capture()">Capture 📷</button>

    <div class="templates">
        <div class="template active" onclick="setFrame('',this)">
            <img src="pinkblue.jpg">
        </div>
        <div class="template" onclick="setFrame('frame1.png',this)">
            <img src="frame1.png">
        </div>
        <div class="template" onclick="setFrame('frame2.png',this)">
            <img src="frame2.png">
        </div>
    </div>
</div>

<div class="preview">
    <div class="frame"><img id="p1"><span class="delete-btn">✕</span></div>
    <div class="frame"><img id="p2"><span class="delete-btn">✕</span></div>
    <div class="frame"><img id="p3"><span class="delete-btn">✕</span></div>
</div>

</div>

<canvas id="canvas" width="500" height="280" style="display:none;"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const frameOverlay = document.getElementById('frame-overlay');

let frame="";
let photos=[];

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
    video.srcObject=stream;
})
.catch(()=>alert("Izinkan kamera ya!"));

/* TEMPLATE */
function setFrame(src,el){
    frame=src;
    frameOverlay.src=src;
    document.querySelectorAll('.template').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
}

/* TIMER */
function capture(){
    let count=3;
    const cd=document.getElementById('countdown');
    cd.style.display="block";
    cd.innerText=count;

    const interval=setInterval(()=>{
        count--;
        if(count>0){
            cd.innerText=count;
        }else{
            clearInterval(interval);
            cd.style.display="none";
            takePhoto();
        }
    },1000);
}

/* TAKE PHOTO */
function takePhoto(){
    if(video.readyState < 2){
        alert("Kamera belum siap!");
        return;
    }

    const ctx=canvas.getContext('2d');

    ctx.save();
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    ctx.restore();

    if(frame){
        const img=new Image();
        img.src=frame;
        img.onload=()=>{
            ctx.drawImage(img,0,0,canvas.width,canvas.height);
            save();
        }
    }else save();
}

/* SAVE */
function save(){
    const data=canvas.toDataURL();
    photos.unshift(data);
    if(photos.length>3) photos.pop();
    updatePreview();
}

/* UPDATE */
function updatePreview(){
    const imgs=["p1","p2","p3"];
    imgs.forEach((id,i)=>{
        document.getElementById(id).src=photos[i]||"";
    });
}

/* DELETE */
document.querySelectorAll('.delete-btn').forEach((btn,index)=>{
    btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        photos.splice(index,1);
        updatePreview();
    });
});

/* TAP MOBILE */
document.querySelectorAll('.frame').forEach(frame=>{
    frame.addEventListener('click',()=>{
        frame.classList.toggle('active');
    });
});
</script>

</body>
</html>
