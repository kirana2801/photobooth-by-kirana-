<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Camera ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fce4ec;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle, #f48fb1 0%, #fce4ec 80%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            position: relative;
        }

        /* --- UI ATAS --- */
        .status-counter { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 20px; }

        .upload-options {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn-small {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- AREA KAMERA (Sesuai Gambar) --- */
        .camera-box {
            width: 500px;
            height: 300px;
            background: #111;
            border-radius: 25px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .camera-msg { color: #666; font-size: 16px; }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efek Mirror */
        }

        .expand-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 5px;
            cursor: pointer;
        }

        /* --- TOMBOL START --- */
        .start-action-btn {
            background: #ff4081;
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(255, 64, 129, 0.3);
        }

        /* --- FILTER BAR (Bulat-bulat di bawah) --- */
        .filter-bar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .filter-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ddd;
            cursor: pointer;
            border: 2px solid white;
            transition: 0.3s;
            background-size: cover;
        }

        .filter-item:hover { transform: scale(1.1); border-color: #ff4081; }

        .more-btn {
            background: #ff4081;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
        }

        /* Bintang-bintang Latar Belakang */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite ease-in-out; pointer-events: none; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }

    </style>
</head>
<body>

    <div class="container" id="bg-container">
        <div class="status-counter">0/4</div>

        <div class="upload-options">
            <button class="btn-small">📤 Upload Image</button>
            <button class="btn-small">3s ▾</button>
        </div>

        <div class="camera-box">
            <p class="camera-msg" id="msg">Waiting for camera access...</p>
            <video id="webcam" autoplay playsinline style="display:none;"></video>
            <div class="expand-btn">🔳</div>
        </div>

        <button class="start-action-btn" onclick="takePhoto()">START</button>

        <div class="filter-bar">
            <div class="filter-item" style="background-image: url('pinkblue.JPG');"></div>
            <div class="filter-item" style="background-image: url('pinkblue2.JPG');"></div>
            <div class="filter-item" style="background-color: #333;"></div>
            <div class="filter-item" style="background-color: #f8bbd0;"></div>
            <div class="filter-item" style="background-color: #b2ebf2;"></div>
            <div class="more-btn">...</div>
        </div>
    </div>

    <script>
        // Minta akses kamera saat halaman dimuat
        const video = document.getElementById('webcam');
        const msg = document.getElementById('msg');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                msg.style.display = 'none';
            } catch (err) {
                alert("Please enable camera permissions!");
            }
        }

        function takePhoto() {
            alert("Satu... Dua... Tiga... Cekrek! 📸");
        }

        // Panggil Kamera
        initCamera();

        // Bintang Latar Belakang
        const bg = document.getElementById('bg-container');
        for (let i = 0; i < 40; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            let size = Math.random() * 3 + 2;
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            bg.appendChild(star);
        }
    </script>
</body>
</html>
