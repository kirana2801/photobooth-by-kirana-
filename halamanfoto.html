```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth Camera ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at 20% 20%, #ffd6eb, transparent),
    radial-gradient(circle at 80% 80%, #ffc1e3, transparent),
    #fff0f6;
    padding:10px;
}

/* BACK */
.back-home{
    position:absolute;
    top:15px;
    left:15px;
    background:white;
    padding:8px 15px;
    border-radius:50px;
    text-decoration:none;
    color:#ff4081;
    font-size:13px;
}

/* LAYOUT */
.main{
    display:flex;
    gap:20px;
    width:100%;
    max-width:900px;
}

/* CAMERA */
.container{
    flex:1;
    padding:15px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(15px);
    border-radius:20px;
    text-align:center;
}

.camera-box{
    width:100%;
    height:260px;
    border-radius:15px;
    overflow:hidden;
    position:relative;
    background:#000;
    margin-bottom:10px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

#frame-overlay{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* BUTTON */
.btn{
    width:100%;
    max-width:220px;
    padding:10px;
    border:none;
    border-radius:30px;
    font-family:'Dancing Script';
    font-size:22px;
    background:white;
    cursor:pointer;
}

/* TEMPLATE */
.templates{
    margin-top:10px;
    display:flex;
    gap:10px;
    justify-content:center;
}

.template{
    width:50px;
    height:50px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid white;
    cursor:pointer;
}

.template img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.template.active{
    border-color:#ff4081;
}

/* PREVIEW */
.preview{
    width:150px;
    padding:10px;
    background:rgba(255,255,255,0.7);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.frame{
    position:relative;
}

.frame img{
    width:100%;
    height:80px;
    border-radius:10px;
    object-fit:cover;
}

/* DELETE */
.delete-btn{
    position:absolute;
    top:5px;
    right:5px;
    background:#ff4081;
    color:white;
    font-size:12px;
    padding:4px;
    border-radius:50%;
    display:none;
}

/* hover desktop */
.frame:hover .delete-btn{
    display:block;
}

/* klik hp */
.frame.active .delete-btn{
    display:block;
}

/* 📱 MOBILE FIX */
@media(max-width:768px){

    .main{
        flex-direction:column;
        align-items:center;
    }

    .preview{
        width:100%;
        flex-direction:row;
        justify-content:center;
    }

    .frame{
        flex:1;
    }

    .frame img{
        height:70px;
    }

    .camera-box{
        height:220px;
    }
}
</style>
</head>

<body>

<a href="index.html" class="back-home">❮ Back</a>

<div class="main">

<div class="container">
    <h2 style="font-family:'Dancing Script'">Ready to Smile? ✨</h2>

    <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay">
    </div>

    <button class="btn" onclick="capture()">Capture 📷</button>

    <div class="templates">
        <div class="template active" onclick="setFrame('',this)">
            <img src="pinkblue.jpg">
        </div>
        <div class="template" onclick="setFrame('frame1.png',this)">
            <img src="frame1.png">
        </div>
        <div class="template" onclick="setFrame('frame2.png',this)">
            <img src="frame2.png">
        </div>
    </div>
</div>

<div class="preview">
    <div class="frame"><img id="p1"><span class="delete-btn">✕</span></div>
    <div class="frame"><img id="p2"><span class="delete-btn">✕</span></div>
    <div class="frame"><img id="p3"><span class="delete-btn">✕</span></div>
</div>

</div>

<canvas id="canvas" width="500" height="260" style="display:none;"></canvas>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
let photos=[];
let frame="";

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream);

/* TEMPLATE */
function setFrame(src,el){
    frame=src;
    document.querySelectorAll('.template').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
}

/* CAPTURE */
function capture(){
    const ctx=canvas.getContext('2d');

    ctx.save();
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    ctx.restore();

    save();
}

/* SAVE */
function save(){
    const data=canvas.toDataURL();
    photos.unshift(data);
    if(photos.length>3) photos.pop();
    update();
}

/* UPDATE */
function update(){
    document.getElementById('p1').src=photos[0]||"";
    document.getElementById('p2').src=photos[1]||"";
    document.getElementById('p3').src=photos[2]||"";
}

/* DELETE */
document.querySelectorAll('.delete-btn').forEach((btn,i)=>{
    btn.onclick=(e)=>{
        e.stopPropagation();
        photos.splice(i,1);
        update();
    }
});

/* TAP HP */
document.querySelectorAll('.frame').forEach(frame=>{
    frame.onclick=()=>frame.classList.toggle('active');
});
</script>

</body>
</html>
