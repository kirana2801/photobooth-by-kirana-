
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth Camera ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at 20% 20%, #ffd6eb, transparent),
    radial-gradient(circle at 80% 80%, #ffc1e3, transparent),
    #fff0f6;
}

/* BACK */
.back-home{
    position:absolute;
    top:30px;
    left:30px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    padding:10px 20px;
    border-radius:50px;
    text-decoration:none;
    color:#ff4081;
}

/* LAYOUT */
.main{
    display:flex;
    gap:30px;
    align-items:center;
}

/* CAMERA */
.container{
    padding:30px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(20px);
    border-radius:30px;
    box-shadow:0 20px 50px rgba(255,182,193,0.3);
    text-align:center;
}

.camera-box{
    width:500px;
    height:380px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:#000;
    margin-bottom:20px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

#frame-overlay{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* COUNTDOWN */
#countdown{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:100px;
    color:white;
    display:none;
    z-index:10;
    font-family:'Dancing Script';
    text-shadow:0 0 20px pink;
}

/* BUTTON */
.btn{
    background:white;
    border:none;
    padding:10px 40px;
    border-radius:30px;
    font-family:'Dancing Script';
    font-size:25px;
    cursor:pointer;
}

/* TEMPLATE */
.templates{
    margin-top:15px;
    display:flex;
    gap:10px;
    justify-content:center;
}

.template{
    width:55px;
    height:55px;
    border-radius:50%;
    border:2px solid white;
    cursor:pointer;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
}

.template.active{border-color:#ff4081;}

.no-frame{
    background: linear-gradient(135deg, #fff, #ffe4ec);
}

/* PREVIEW */
.preview{
    width:180px;
    padding:15px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(20px);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.frame{
    position:relative;
    transition:0.3s;
}

.frame img{
    width:100%;
    height:100px;
    border-radius:10px;
    object-fit:cover;
}

/* DELETE BUTTON */
.delete-btn{
    position:absolute;
    top:5px;
    right:5px;
    background:#ff4081;
    color:white;
    font-size:12px;
    padding:5px 8px;
    border-radius:50%;
    opacity:0;
    transform:scale(0.6);
    transition:0.25s ease;
    cursor:pointer;
}

/* DESKTOP HOVER */
.frame:hover .delete-btn{
    opacity:1;
    transform:scale(1);
}

/* MOBILE TAP */
.frame.active .delete-btn{
    opacity:1;
    transform:scale(1);
}
</style>
</head>

<body>

<a href="index.html" class="back-home">❮ Back</a>

<div class="main">

<div class="container">
    <h2 style="font-family:'Dancing Script'">Ready to Smile? ✨</h2>

    <div class="camera-box">
        <video id="video" autoplay></video>
        <img id="frame-overlay">
        <div id="countdown">3</div>
    </div>

    <button class="btn" onclick="capture()">Capture 📷</button>

    <div class="templates">
        <div class="template no-frame active" onclick="setFrame('',this)">✨</div>
        <div class="template" style="background-image:url('frame1.png')" onclick="setFrame('frame1.png',this)"></div>
        <div class="template" style="background-image:url('frame2.png')" onclick="setFrame('frame2.png',this)"></div>
        <div class="template" style="background-image:url('frame3.png')" onclick="setFrame('frame3.png',this)"></div>
    </div>
</div>

<div class="preview">
    <div class="frame" data-index="0"><img id="p1"><span class="delete-btn">✕</span></div>
    <div class="frame" data-index="1"><img id="p2"><span class="delete-btn">✕</span></div>
    <div class="frame" data-index="2"><img id="p3"><span class="delete-btn">✕</span></div>
</div>

</div>

<canvas id="canvas" width="500" height="380" style="display:none;"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const frameOverlay = document.getElementById('frame-overlay');

let frame = "";
let photos = [];

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => video.play();
})
.catch(err => alert("Izinkan kamera ya!") );

/* TEMPLATE */
function setFrame(src,el){
    frame = src;
    frameOverlay.src = src;
    document.querySelectorAll('.template').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
}

/* TIMER */
function capture(){
    let count = 3;
    const cd = document.getElementById('countdown');
    cd.style.display="block";
    cd.innerText=count;

    const interval=setInterval(()=>{
        count--;
        if(count>0){
            cd.innerText=count;
        }else{
            clearInterval(interval);
            cd.style.display="none";
            takePhoto();
        }
    },1000);
}

/* TAKE PHOTO */
function takePhoto(){
    if(video.readyState < 2) return alert("Kamera belum siap!");

    const ctx = canvas.getContext('2d');

    ctx.save();
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    ctx.restore();

    if(frame){
        const img=new Image();
        img.src=frame;
        img.onload=()=>{
            ctx.drawImage(img,0,0,canvas.width,canvas.height);
            savePreview();
        }
    }else savePreview();
}

/* SAVE */
function savePreview(){
    const data=canvas.toDataURL();
    photos.unshift(data);
    if(photos.length>3) photos.pop();
    updatePreview();
}

/* UPDATE PREVIEW */
function updatePreview(){
    const frames = document.querySelectorAll('.frame');

    frames.forEach((frameEl, i) => {
        const img = frameEl.querySelector('img');
        img.src = photos[i] || "";
        frameEl.dataset.index = i;

        frameEl.style.transform = "translateX(0)";
        frameEl.style.opacity = 1;
        frameEl.classList.remove('active');
    });
}

/* DELETE CLICK */
document.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        const frameEl = btn.parentElement;
        const index = parseInt(frameEl.dataset.index);

        if(!isNaN(index)){
            photos.splice(index,1);
            updatePreview();
        }
    });
});

/* TAP (MOBILE) */
document.querySelectorAll('.frame').forEach(frameEl=>{
    frameEl.addEventListener('click', ()=>{
        frameEl.classList.toggle('active');
    });
});

/* SWIPE DELETE */
document.querySelectorAll('.frame').forEach(frameEl=>{
    let startX=0,currentX=0,isDrag=false;

    function start(e){
        isDrag=true;
        startX=e.touches?e.touches[0].clientX:e.clientX;
        frameEl.style.transition="none";
    }

    function move(e){
        if(!isDrag) return;
        currentX=e.touches?e.touches[0].clientX:e.clientX;
        let diff=currentX-startX;
        frameEl.style.transform=`translateX(${diff}px)`;
        frameEl.style.opacity=1-Math.abs(diff)/150;
    }

    function end(){
        if(!isDrag) return;
        isDrag=false;
        let diff=currentX-startX;

        if(Math.abs(diff)>80){
            const index=parseInt(frameEl.dataset.index);
            frameEl.style.transition="0.3s";
            frameEl.style.transform=`translateX(${diff>0?300:-300}px)`;
            frameEl.style.opacity=0;

            setTimeout(()=>{
                photos.splice(index,1);
                updatePreview();
            },200);
        }else{
            frameEl.style.transition="0.3s";
            frameEl.style.transform="translateX(0)";
            frameEl.style.opacity=1;
        }
    }

    frameEl.addEventListener('mousedown',start);
    frameEl.addEventListener('touchstart',start);
    frameEl.addEventListener('mousemove',move);
    frameEl.addEventListener('touchmove',move);
    frameEl.addEventListener('mouseup',end);
    frameEl.addEventListener('mouseleave',end);
    frameEl.addEventListener('touchend',end);
});
</script>

</body>
</html>
